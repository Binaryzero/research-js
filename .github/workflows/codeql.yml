name: "CodeQL"

# Advanced CodeQL setup, scoped to JavaScript/TypeScript only.
#
# Why this exists: the repo's CodeQL *default setup* also enabled the "actions"
# language. Its analysis is diff-informed on PRs and extracts only workflow
# files the PR touches, so any PR that doesn't edit .github/workflows/** sees
# "no source code" and the "Analyze (actions)" check fails. This advanced-setup
# workflow replaces default setup and analyzes only javascript-typescript,
# dropping the actions language entirely.
#
# CodeQL default setup has been DISABLED for this repo, so this workflow is the
# single source of CodeQL analysis. Do not re-enable default setup: an advanced
# workflow and default setup cannot coexist — advanced runs error on upload
# ("advanced configurations cannot be processed when the default setup is
# enabled") whenever default setup is on.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '30 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
