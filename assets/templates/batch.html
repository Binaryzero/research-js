{% extends "base.html" %}
{% block title %}Batch Marketplace Scanner{% endblock %}

{% block content %}
<div class="analyze-layout">
    <aside class="sidebar">
        <!-- Card 1: Search -->
        <div class="sidebar-card">
            <div class="sidebar-header">Search Extensions</div>
            <form id="search-form" class="batch-search-form" onsubmit="return doSearch(event)">
                <div class="form-group">
                    <label for="search-text">Search terms</label>
                    <input type="text" id="search-text" name="search_text" placeholder="e.g. python, copilot, AI agent">
                </div>
                <div class="search-fields-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category">
                            {% for cat in categories %}<option>{{ cat }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sort-by">Sort by</label>
                        <select id="sort-by" name="sort_by">
                            {% for s in sort_options %}<option>{{ s }}</option>{% endfor %}
                        </select>
                    </div>
                </div>
                <div class="search-fields-row">
                    <div class="form-group">
                        <label for="page-size">Count</label>
                        <input type="number" id="page-size" name="page_size" value="50" min="5" max="500" step="5">
                    </div>
                    <div class="form-group">
                        <label for="page-num">Page</label>
                        <input type="number" id="page-num" name="page" value="1" min="1" max="100">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>

        <!-- Card 2: Progress (hidden until scan starts) -->
        <div class="sidebar-card" id="progress-sidebar-card" style="display:none">
            <div class="sidebar-header">Progress</div>
            <div class="progress-compact">
                <span id="progress-text">Scanning 0 of 0...</span>
                <button class="btn btn-outline btn-sm" id="cancel-btn" onclick="cancelBatchScan()">Cancel</button>
            </div>
            <progress id="progress-bar" value="0" max="100"></progress>
            <button class="progress-log-toggle" onclick="toggleProgressLog()">Show log</button>
            <div id="progress-log" class="progress-log-collapsed"></div>
        </div>

        <!-- Card 3: Result Filters -->
        <div class="sidebar-card">
            <div class="sidebar-header">Filters</div>
            <div class="batch-filter-group">
                <div class="form-group">
                    <label for="filter-scan-status">Scan Status</label>
                    <select id="filter-scan-status" class="filter-select" onchange="applyResultFiltersAndFill()">
                        <option value="">All Results</option>
                        <option value="scanned">Scanned Only</option>
                        <option value="unscanned">Unscanned Only</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filter-verdict">Verdict</label>
                    <select id="filter-verdict" class="filter-select" onchange="applyResultFiltersAndFill()">
                        <option value="">All Verdicts</option>
                        <option value="MALICIOUS">Malicious</option>
                        <option value="SUSPICIOUS">Suspicious</option>
                        <option value="CLEAN">Clean</option>
                        <option value="NO_VERDICT">No Verdict</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filter-llm">LLM Status</label>
                    <select id="filter-llm" class="filter-select" onchange="applyResultFiltersAndFill()">
                        <option value="">LLM: All</option>
                        <option value="llm">With LLM</option>
                        <option value="no-llm">Without LLM</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filter-risk">Risk Level</label>
                    <select id="filter-risk" class="filter-select" onchange="applyResultFiltersAndFill()">
                        <option value="">All Risk Levels</option>
                        <option value="Very Suspicious">Very Suspicious</option>
                        <option value="Suspicious">Suspicious</option>
                        <option value="Moderate">Moderate</option>
                        <option value="Low Risk">Low Risk</option>
                    </select>
                </div>
                <button type="button" class="btn btn-outline btn-sm" onclick="clearResultFilters()">Clear filters</button>
            </div>
        </div>

        <!-- Card 4: Bulk Actions (hidden until selection > 0) -->
        <div class="sidebar-card" id="bulk-actions-card" style="display:none">
            <div class="sidebar-header">Bulk Actions</div>
            <div class="bulk-actions-content">
                <span class="selection-count" id="selection-count">0 selected</span>
                <div class="button-stack">
                    <button class="btn btn-primary" onclick="rescanSelected(false)">Rescan Selected</button>
                    <button class="btn btn-outline" onclick="rescanSelected(true)">Rescan + LLM</button>
                    <button class="btn btn-outline" onclick="clearSelection()">Clear Selection</button>
                </div>
            </div>
        </div>
    </aside>

    <section class="main-content">

        <!-- Results area -->
        <div id="results-area" style="display:none;">
            <div class="results-header">
                <h3 id="results-title">Results</h3>
                <div class="results-actions">
                    <button id="scan-all-btn" class="btn btn-primary" onclick="scanAllNew()" style="display:none">Scan All New</button>
                    <button id="llm-all-btn" class="btn btn-secondary" onclick="llmAnalyzeAll()" style="display:none">Analyze All (LLM)</button>
                </div>
            </div>
            <div id="select-all-container" class="select-all-row" style="display:none">
                <input type="checkbox" class="select-checkbox" id="select-all-cb" onchange="toggleSelectAll(this.checked)">
                <label for="select-all-cb">Select all scanned</label>
            </div>
            <div id="ext-list"></div>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
let searchResults = [];
let _batchTracker = null;
let _searchDebounce = null;
let selectedExtensions = new Set();
let scanProgress = { current: 0, total: 0 };

function initBatchPage() {
    initSessionTracking();
    loadFilterSettings();
    initFilterListeners();
    // Auto-load results with current parameters on page load
    executeSearch(getSearchFormData());
}

// Wait for DOM and deferred scripts (app.js) to be ready
function waitForAppJs(callback) {
    if (typeof toastError === 'function') {
        callback();
    } else {
        // app.js hasn't loaded yet, wait and retry
        setTimeout(function() { waitForAppJs(callback); }, 50);
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { waitForAppJs(initBatchPage); });
} else {
    waitForAppJs(initBatchPage);
}

// -- Load/Save filter settings --
function loadFilterSettings() {
    const saved = JSON.parse(localStorage.getItem('batchFilters') || '{}');
    if (saved.category) document.getElementById('category').value = saved.category;
    if (saved.sort_by) document.getElementById('sort-by').value = saved.sort_by;
    if (!saved.sort_by) document.getElementById('sort-by').value = 'Published Date';
    if (saved.page_size) document.getElementById('page-size').value = saved.page_size;
    // Result filters are intentionally NOT restored across page loads. Persisting
    // them silently hid every search result: the default sort returns brand-new
    // extensions (no scan), and every filter option except "unscanned" requires a
    // scan to exist — so one stale saved filter zeroed the page on load, forever.
    // Filters always start at "All"; in-session filtering still works.
}

function saveFilterSettings() {
    // Persist only the search parameters, never the result filters (see above).
    const settings = {
        category: document.getElementById('category').value,
        sort_by: document.getElementById('sort-by').value,
        page_size: document.getElementById('page-size').value,
    };
    localStorage.setItem('batchFilters', JSON.stringify(settings));
}

function clearResultFilters() {
    document.getElementById('filter-scan-status').value = '';
    document.getElementById('filter-verdict').value = '';
    document.getElementById('filter-llm').value = '';
    document.getElementById('filter-risk').value = '';
    applyResultFilters();
}

// -- Filter listeners for auto-search --
function initFilterListeners() {
    // Auto-search when category or sort changes
    document.getElementById('category').addEventListener('change', () => {
        saveFilterSettings();
        debounceSearch();
    });
    document.getElementById('sort-by').addEventListener('change', () => {
        saveFilterSettings();
        debounceSearch();
    });
    document.getElementById('page-num').addEventListener('change', () => {
        debounceSearch();
    });
    document.getElementById('page-size').addEventListener('change', () => {
        saveFilterSettings();
        debounceSearch();
    });
    // Also trigger on Enter in search box
    document.getElementById('search-text').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            debounceSearch();
        }
    });
}

function debounceSearch() {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(() => {
        // Always search if there are existing results, or if user has entered search criteria
        const searchText = document.getElementById('search-text').value.trim();
        const category = document.getElementById('category').value;
        const sortBy = document.getElementById('sort-by').value;
        const pageNum = document.getElementById('page-num').value;

        // Search if: there's text, OR category is selected, OR we have existing results
        if (searchText || (category && category !== 'All categories') || searchResults.length > 0) {
            executeSearch(getSearchFormData());
        }
    }, 300);
}

// -- Session tracking for "Current Session" filter in History --
function initSessionTracking() {
    if (!sessionStorage.getItem('scanSessionId')) {
        sessionStorage.setItem('scanSessionId', Date.now().toString());
    }
}

function getSessionId() {
    return sessionStorage.getItem('scanSessionId');
}

function addToSession(extensionId) {
    const sessionScans = JSON.parse(sessionStorage.getItem('sessionScans') || '[]');
    if (!sessionScans.includes(extensionId)) {
        sessionScans.push(extensionId);
        sessionStorage.setItem('sessionScans', JSON.stringify(sessionScans));
    }
}

// -- Search --
function getSearchFormData() {
    const formData = new FormData();
    formData.append('search_text', document.getElementById('search-text').value);
    formData.append('category', document.getElementById('category').value);
    formData.append('sort_by', document.getElementById('sort-by').value);
    formData.append('page', document.getElementById('page-num').value);
    formData.append('page_size', document.getElementById('page-size').value);
    return formData;
}

function doSearch(e) {
    e.preventDefault();
    executeSearch(getSearchFormData());
    return false;
}

// Count means "items I want to SEE": filters hide results client-side, so a
// single marketplace page of `count` can render far fewer. After each search
// (and each filter change) we keep fetching subsequent pages until the
// filtered view reaches `count`, results run out, or the page cap is hit.
const AUTOFILL_MAX_EXTRA_PAGES = 9;

// State of the active search's auto-fill; regenerated per search so a stale
// in-flight top-up can never append into a newer search's results.
let searchFill = null;

async function fetchSearchPage(baseForm, page) {
    const formData = new FormData();
    for (const [k, v] of baseForm.entries()) formData.append(k, v);
    formData.set('page', String(page));
    const resp = await fetch('/api/search', { method: 'POST', body: formData });
    if (!resp.ok) {
        let detail = 'Search failed (' + resp.status + ')';
        try { const err = await resp.json(); detail = err.error || err.detail || detail; } catch {}
        throw new Error(detail);
    }
    const data = await resp.json();
    // Guard against a malformed/empty body so a bad response can't throw
    // inside the filter/render path and blank the page with no explanation.
    return Array.isArray(data.results) ? data.results : [];
}

async function executeSearch(formData) {
    const startPage = parseInt(formData.get('page'), 10) || 1;
    const pageSize = parseInt(formData.get('page_size'), 10) || 50;
    const fill = {
        baseForm: formData,
        nextPage: startPage + 1,
        pagesFetched: 1,
        target: pageSize,
        exhausted: false,
        fetching: false,
    };
    try {
        const first = await fetchSearchPage(formData, startPage);
        searchFill = fill;
        fill.exhausted = first.length < pageSize;
        searchResults = first;
        selectedExtensions.clear();
        updateBulkActions();
        applyResultFiltersAndFill();
    } catch(err) {
        toastError('Search error: ' + err.message);
    }
}

/** Top up the visible (filtered) list to the requested count. */
async function fillToCount() {
    const fill = searchFill;
    if (!fill || fill.fetching) return;
    fill.fetching = true;
    try {
        while (
            searchFill === fill &&
            !fill.exhausted &&
            fill.pagesFetched <= AUTOFILL_MAX_EXTRA_PAGES &&
            filterResults(searchResults).length < fill.target
        ) {
            const more = await fetchSearchPage(fill.baseForm, fill.nextPage);
            if (searchFill !== fill) return; // a newer search took over
            fill.nextPage++;
            fill.pagesFetched++;
            if (more.length < fill.target) fill.exhausted = true;
            if (more.length === 0) break;
            // Marketplace pagination can shift between requests — dedupe.
            const seen = new Set(searchResults.map(r => r.extensionId));
            searchResults = searchResults.concat(more.filter(r => !seen.has(r.extensionId)));
            applyResultFilters();
        }
    } catch (err) {
        toastError('Search error: ' + err.message);
    } finally {
        fill.fetching = false;
        if (searchFill === fill) applyResultFilters(); // final render clears the loading note
    }
}

// -- Render results --
function renderResults(results) {
    const area = document.getElementById('results-area');
    const list = document.getElementById('ext-list');
    area.style.display = '';
    list.textContent = '';

    const unscanned = results.filter(r => !r.scan);
    const unanalyzed = results.filter(r => r.scan && !r.scan.llm_analyzed);
    const scannedCount = results.length - unscanned.length;

    const hiddenByFilters = Math.max(0, searchResults.length - results.length);
    let titleText = `${results.length} results (${scannedCount} scanned, ${unscanned.length} new, ${unanalyzed.length} LLM-ready)`;
    if (hiddenByFilters > 0) titleText += ` · ${hiddenByFilters} hidden by filters`;
    if (searchFill && searchFill.fetching) titleText += ' · loading more…';
    document.getElementById('results-title').textContent = titleText;

    const scanAllBtn = document.getElementById('scan-all-btn');
    const llmAllBtn = document.getElementById('llm-all-btn');

    if (unscanned.length > 0) {
        scanAllBtn.style.display = '';
        scanAllBtn.textContent = `Scan All New (${unscanned.length})`;
    } else {
        scanAllBtn.style.display = 'none';
    }

    if (unanalyzed.length > 0) {
        llmAllBtn.style.display = '';
        llmAllBtn.textContent = `Analyze All (LLM) (${unanalyzed.length})`;
    } else {
        llmAllBtn.style.display = 'none';
    }

    const selectAllContainer = document.getElementById('select-all-container');
    if (scannedCount > 0) {
        selectAllContainer.style.display = '';
    } else {
        selectAllContainer.style.display = 'none';
    }

    results.forEach(ext => {
        const row = document.createElement('div');
        row.className = 'ext-row';

        const info = document.createElement('div');
        info.className = 'ext-info';

        const title = document.createElement('h4');
        if (ext.scan) {
            const badge = document.createElement('span');
            badge.className = 'verdict-badge';
            const colors = badgeColor(ext.scan.risk_color);
            badge.style.background = colors.bg;
            badge.style.color = colors.fg;
            badge.textContent = ext.scan.score;
            title.appendChild(badge);
            title.appendChild(document.createTextNode(' '));
            if (ext.scan.verdict && ext.scan.verdict !== 'CLEAN') {
                const vBadge = document.createElement('span');
                vBadge.className = 'verdict-badge';
                if (ext.scan.verdict === 'MALICIOUS') {
                    vBadge.style.background = '#dc2626';
                    vBadge.style.color = '#fff';
                } else {
                    vBadge.style.background = 'rgba(217, 119, 6, 0.15)';
                    vBadge.style.color = '#d97706';
                }
                vBadge.textContent = ext.scan.verdict;
                title.appendChild(vBadge);
                title.appendChild(document.createTextNode(' '));
            }
        }
        title.appendChild(document.createTextNode(`${ext.displayName}`));

        const extId = document.createElement('span');
        extId.className = 'ext-id';
        extId.textContent = ext.extensionId;

        const desc = document.createElement('p');
        desc.textContent = ext.shortDescription || '';

        const meta = document.createElement('div');
        meta.className = 'ext-meta';
        const installs = ext.statistics?.installCount || 0;
        const rating = ext.statistics?.rating || 0;
        const parts = [`${formatInstalls(installs)} installs`];
        if (rating) parts.push(`★ ${rating.toFixed(1)}`);
        if (ext.scan) {
            parts.push(`${ext.scan.findings_count} findings`);
            // Show LLM reduction if analyzed (like history)
            if (ext.scan.llm_analyzed && ext.scan.true_positives !== undefined) {
                parts.push(`(${ext.scan.true_positives} TP)`);
            }
            if (ext.scan.llm_analyzed) parts.push('LLM ✓');
        }
        meta.textContent = parts.join(' · ');

        info.appendChild(title);
        info.appendChild(extId);
        info.appendChild(desc);
        info.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'ext-actions';

        // Marketplace and download links (always available)
        const mpLink = document.createElement('a');
        mpLink.className = 'btn btn-outline btn-sm';
        mpLink.href = `https://marketplace.visualstudio.com/items?itemName=${encodeURIComponent(ext.extensionId)}`;
        mpLink.target = '_blank';
        mpLink.rel = 'noopener';
        mpLink.title = 'View on Marketplace';
        mpLink.textContent = 'Page';
        actions.appendChild(mpLink);

        const idParts = ext.extensionId.split('.');
        if (idParts.length >= 2) {
            const publisher = idParts[0];
            const extension = idParts.slice(1).join('.');
            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn btn-outline btn-sm';
            dlBtn.title = 'Download VSIX';
            dlBtn.textContent = 'VSIX';
            dlBtn.addEventListener('click', () => downloadVsix(publisher, extension, ext.extensionId, dlBtn));
            actions.appendChild(dlBtn);
        }

        if (ext.scan) {
            const viewBtn = document.createElement('a');
            viewBtn.className = 'btn btn-outline btn-sm';
            viewBtn.href = `/report/${ext.scan.report_name}`;
            viewBtn.textContent = 'View';
            actions.appendChild(viewBtn);

            // Only show LLM button if there are findings to analyze
            if (!ext.scan.llm_analyzed && ext.scan.findings_count > 0) {
                const llmBtn = document.createElement('button');
                llmBtn.className = 'btn btn-secondary btn-sm';
                llmBtn.textContent = 'LLM';
                llmBtn.addEventListener('click', () => startLlmAnalysis(ext));
                actions.appendChild(llmBtn);
            }
            const rescanBtn = document.createElement('button');
            rescanBtn.className = 'btn btn-secondary btn-sm';
            rescanBtn.textContent = 'Re-scan';
            rescanBtn.addEventListener('click', () => scanSingle(ext));
            actions.appendChild(rescanBtn);
        } else {
            const scanBtn = document.createElement('button');
            scanBtn.className = 'btn btn-primary btn-sm';
            scanBtn.textContent = 'Scan';
            scanBtn.addEventListener('click', () => scanSingle(ext));
            actions.appendChild(scanBtn);
        }

        row.appendChild(info);
        row.appendChild(actions);

        const wrapper = document.createElement('div');
        wrapper.className = 'ext-row-selectable';
        if (ext.scan) {
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'select-checkbox';
            cb.dataset.extId = ext.extensionId;
            cb.checked = selectedExtensions.has(ext.extensionId);
            cb.addEventListener('change', () => toggleSelectOne(ext.extensionId, cb.checked));
            wrapper.appendChild(cb);
        } else {
            const spacer = document.createElement('input');
            spacer.type = 'checkbox';
            spacer.className = 'select-checkbox select-checkbox-spacer';
            spacer.disabled = true;
            wrapper.appendChild(spacer);
        }
        wrapper.appendChild(row);
        list.appendChild(wrapper);
    });
}

function badgeColor(color) {
    const map = {
        red:    { bg: 'rgba(231, 76, 60, 0.15)',  fg: '#e74c3c' },
        orange: { bg: 'rgba(230, 126, 34, 0.15)', fg: '#e67e22' },
        yellow: { bg: 'rgba(234, 179, 8, 0.15)',  fg: '#ca8a04' },
        green:  { bg: 'rgba(39, 174, 96, 0.15)',  fg: '#27ae60' },
        gray:   { bg: 'rgba(149, 165, 166, 0.15)',fg: '#95a5a6' },
    };
    return map[color] || map.gray;
}

function showBatchStatusBanner(message) {
    const banner = document.getElementById('batch-status-banner');
    const summary = document.getElementById('batch-status-summary');
    if (!banner || !summary) return;
    summary.textContent = message;
    banner.style.display = '';
}

function hideBatchStatusBanner() {
    const banner = document.getElementById('batch-status-banner');
    if (!banner) return;
    banner.style.display = 'none';
}

// -- Scan actions --
async function downloadVsix(publisher, extension, extId, btn) {
    const origText = btn.textContent;
    btn.textContent = 'Downloading...';
    btn.disabled = true;
    try {
        const url = `https://${publisher}.gallery.vsassets.io/_apis/public/gallery/publisher/${publisher}/extension/${extension}/latest/assetbyname/Microsoft.VisualStudio.Services.VSIXPackage`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const blob = await resp.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${extId}.vsix`;
        a.click();
        URL.revokeObjectURL(a.href);
    } catch (err) {
        toastError('Download failed: ' + err.message);
    } finally {
        btn.textContent = origText;
        btn.disabled = false;
    }
}

function scanSingle(ext) {
    const url = `https://marketplace.visualstudio.com/items?itemName=${ext.extensionId}`;
    const formData = new FormData();
    formData.append('input_source', url);
    formData.append('no_llm', 'true');
    formData.append('full_output', 'true');

    document.getElementById('progress-sidebar-card').style.display = '';
    fetch('/api/scan', { method: 'POST', body: formData })
        .then(r => {
            if (!r.ok) return r.json().then(err => { throw new Error(err.detail || `Error ${r.status}`); });
            return r.json();
        })
        .then(data => {
            if (!data.scan_id) throw new Error('No scan ID returned');
            _batchTracker = createScanTracker(data.scan_id, {
                progressBar: document.getElementById('progress-bar'),
                logArea: document.getElementById('progress-log'),
                titleEl: document.getElementById('progress-text'),
                progressArea: document.getElementById('progress-sidebar-card'),
                onComplete: (result) => {
                    // Clear cached results to force fresh lookup from history
                    searchResults = [];
                    executeSearch(getSearchFormData());
                    // Show success if we have an extension ID
                    if (result && result.extensionId) {
                        addToSession(result.extensionId);
                        toastSuccess(`Scan complete: ${result.extensionId}`);
                    } else {
                        toastSuccess('Scan complete');
                    }
                }
            }).start();
        })
        .catch(err => {
            toastError('Error starting scan: ' + err.message);
            document.getElementById('progress-sidebar-card').style.display = 'none';
        });
}

function scanAllNew() {
    const unscanned = searchResults.filter(r => !r.scan);
    if (unscanned.length === 0) return;

    document.getElementById('progress-sidebar-card').style.display = '';
    fetch('/api/batch-scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ extensions: unscanned })
    })
    .then(r => {
        if (!r.ok) return r.json().then(err => { throw new Error(err.detail || `Error ${r.status}`); });
        return r.json();
    })
    .then(data => {
        if (!data.scan_id) throw new Error('No scan ID returned');
        _batchTracker = createScanTracker(data.scan_id, {
            progressBar: document.getElementById('progress-bar'),
            logArea: document.getElementById('progress-log'),
            titleEl: document.getElementById('progress-text'),
            progressArea: document.getElementById('progress-sidebar-card'),
            onComplete: (result) => {
                const count = result?.totalScanned || unscanned.length;
                toastSuccess(`Batch scan complete: ${count} extensions scanned. Results updated below.`);
                // Clear cached results to force fresh lookup from history
                searchResults = [];
                executeSearch(getSearchFormData());
            }
        }).start();
    })
    .catch(err => {
        toastError('Error starting batch scan: ' + err.message);
        document.getElementById('progress-sidebar-card').style.display = 'none';
    });
}

function startLlmAnalysis(ext) {
    document.getElementById('progress-sidebar-card').style.display = '';
    document.getElementById('progress-text').textContent = `Analyzing ${ext.extensionId}...`;

    fetch('/api/llm-analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            publisher: ext.publisher?.publisherName || ext.publisher,
            extension_name: ext.extensionName,
            full_output: true,
        })
    })
        .then(r => {
            if (!r.ok) return r.json().then(err => { throw new Error(err.detail || `Error ${r.status}`); });
            return r.json();
        })
        .then(data => {
            if (!data.scan_id) throw new Error('No scan ID returned');
            _batchTracker = createScanTracker(data.scan_id, {
                progressBar: document.getElementById('progress-bar'),
                logArea: document.getElementById('progress-log'),
                titleEl: document.getElementById('progress-text'),
                progressArea: document.getElementById('progress-sidebar-card'),
                onComplete: () => {
                    toastSuccess('LLM analysis complete. Results updated below.');
                    // Clear cached results to force fresh lookup from history
                    searchResults = [];
                    executeSearch(getSearchFormData());
                }
            }).start();
        })
        .catch(err => {
            toastError('Error starting LLM analysis: ' + err.message);
            document.getElementById('progress-sidebar-card').style.display = 'none';
        });
}

/** Apply the current filter selections to a result list (pure — no render). */
function filterResults(results) {
    const scanStatus = document.getElementById('filter-scan-status').value;
    const verdict = document.getElementById('filter-verdict').value;
    const llm = document.getElementById('filter-llm').value;
    const risk = document.getElementById('filter-risk').value;

    let filtered = results;

    if (scanStatus === 'scanned') filtered = filtered.filter(r => r.scan);
    else if (scanStatus === 'unscanned') filtered = filtered.filter(r => !r.scan);

    if (verdict === 'NO_VERDICT') {
        filtered = filtered.filter(r => r.scan && !r.scan.verdict);
    } else if (verdict) {
        filtered = filtered.filter(r => r.scan && r.scan.verdict === verdict);
    }
    if (llm === 'llm') filtered = filtered.filter(r => r.scan && r.scan.llm_analyzed);
    else if (llm === 'no-llm') filtered = filtered.filter(r => r.scan && !r.scan.llm_analyzed);
    if (risk) filtered = filtered.filter(r => r.scan && r.scan.risk_label === risk);

    return filtered;
}

function applyResultFilters() {
    saveFilterSettings();
    renderResults(filterResults(searchResults));
}

/** Filter-change entry point: re-render, then top up the visible list to the
    requested count from the next marketplace pages. Kept separate from
    applyResultFilters so the fill loop's own re-renders can't recurse. */
function applyResultFiltersAndFill() {
    applyResultFilters();
    fillToCount();
}

function cancelBatchScan() {
    if (_batchTracker) {
        _batchTracker.cancel();
        _batchTracker = null;
    }
    document.getElementById('progress-sidebar-card').style.display = 'none';
}

// -- LLM Analyze All for batch page (search results) --
function llmAnalyzeAll() {
    // Filter for items that have findings to analyze (not already LLM analyzed AND have findings)
    const unanalyzed = searchResults.filter(r => r.scan && !r.scan.llm_analyzed && r.scan.findings_count > 0);
    if (unanalyzed.length === 0) {
        toastInfo('No extensions with findings to analyze');
        return;
    }

    document.getElementById('progress-sidebar-card').style.display = '';
    document.getElementById('progress-text').textContent = `Analyzing ${unanalyzed.length} extensions with LLM...`;

    const extensions = unanalyzed.map(ext => ({
        publisher: ext.publisher?.publisherName || ext.publisher,
        extensionName: ext.extensionName
    }));

    fetch('/api/batch-llm-analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            extensions: extensions,
        })
    })
    .then(r => {
        if (!r.ok) return r.json().then(err => { throw new Error(err.detail || `Error ${r.status}`); });
        return r.json();
    })
    .then(data => {
        if (!data.scan_id) throw new Error('No scan ID returned');
        _batchTracker = createScanTracker(data.scan_id, {
            progressBar: document.getElementById('progress-bar'),
            logArea: document.getElementById('progress-log'),
            titleEl: document.getElementById('progress-text'),
            progressArea: document.getElementById('progress-sidebar-card'),
            onComplete: (result) => {
                const count = result?.totalScanned || unanalyzed.length;
                toastSuccess(`LLM analysis complete: ${count} extensions analyzed. Results updated below.`);
                // Clear cached results to force fresh lookup from history
                searchResults = [];
                executeSearch(getSearchFormData());
            }
        }).start();
    })
    .catch(err => {
        toastError('Error starting batch LLM analysis: ' + err.message);
        document.getElementById('progress-sidebar-card').style.display = 'none';
    });
}

// -- Selection management --
function toggleSelectAll(checked) {
    const checkboxes = document.querySelectorAll('#ext-list .select-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = checked;
        const extId = cb.dataset.extId;
        if (checked) {
            selectedExtensions.add(extId);
        } else {
            selectedExtensions.delete(extId);
        }
    });
    updateBulkActions();
}

function toggleSelectOne(extensionId, checked) {
    if (checked) {
        selectedExtensions.add(extensionId);
    } else {
        selectedExtensions.delete(extensionId);
    }
    // Update select-all checkbox state
    const allCbs = document.querySelectorAll('#ext-list .select-checkbox');
    const selectAllCb = document.getElementById('select-all-cb');
    if (selectAllCb) {
        selectAllCb.checked = allCbs.length > 0 && [...allCbs].every(cb => cb.checked);
    }
    updateBulkActions();
}

function updateBulkActions() {
    const card = document.getElementById('bulk-actions-card');
    const countEl = document.getElementById('selection-count');
    if (selectedExtensions.size > 0) {
        card.style.display = '';
        countEl.textContent = `${selectedExtensions.size} selected`;
    } else {
        card.style.display = 'none';
    }
}

function clearSelection() {
    selectedExtensions.clear();
    document.querySelectorAll('#ext-list .select-checkbox').forEach(cb => cb.checked = false);
    const selectAllCb = document.getElementById('select-all-cb');
    if (selectAllCb) selectAllCb.checked = false;
    updateBulkActions();
}

function rescanSelected(withLlm) {
    if (selectedExtensions.size === 0) return;

    const extensions = searchResults.filter(r => selectedExtensions.has(r.extensionId));
    if (extensions.length === 0) return;

    scanProgress = { current: 0, total: extensions.length };
    document.getElementById('progress-sidebar-card').style.display = '';
    document.getElementById('progress-text').textContent = `Scanning 0 of ${extensions.length}...`;

    fetch('/api/batch-scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ extensions, no_llm: !withLlm })
    })
    .then(r => {
        if (!r.ok) return r.json().then(err => { throw new Error(err.detail || `Error ${r.status}`); });
        return r.json();
    })
    .then(data => {
        if (!data.scan_id) throw new Error('No scan ID returned');
        _batchTracker = createScanTracker(data.scan_id, {
            progressBar: document.getElementById('progress-bar'),
            logArea: document.getElementById('progress-log'),
            titleEl: document.getElementById('progress-text'),
            progressArea: document.getElementById('progress-sidebar-card'),
            onComplete: (result) => {
                const count = result?.totalScanned || extensions.length;
                document.getElementById('progress-text').textContent = `Complete — ${count} scanned`;
                document.getElementById('progress-text').classList.add('complete');
                toastSuccess(`Rescan complete: ${count} extensions scanned.`);
                clearSelection();
                searchResults = [];
                executeSearch(getSearchFormData());
            }
        }).start();
    })
    .catch(err => {
        toastError('Error starting rescan: ' + err.message);
        document.getElementById('progress-sidebar-card').style.display = 'none';
    });
}

// -- Progress log toggle --
function toggleProgressLog() {
    const log = document.getElementById('progress-log');
    const btn = log.previousElementSibling;
    if (log.classList.contains('progress-log-collapsed')) {
        log.classList.remove('progress-log-collapsed');
        log.classList.add('progress-log-expanded');
        btn.textContent = 'Hide log';
    } else {
        log.classList.remove('progress-log-expanded');
        log.classList.add('progress-log-collapsed');
        btn.textContent = 'Show log';
    }
}
</script>
